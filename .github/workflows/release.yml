name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # criar release + anexar o .vsix (usa GITHUB_TOKEN; nenhum segredo manual)

jobs:
  release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Gate pelo RESULTADO dos testes, não pelo encerramento do processo (ver ci.yml).
      - name: Test (xUnit, net48)
        shell: pwsh
        run: |
          dotnet test SqlBeaver.slnx --configuration Release --nologo --blame-hang-timeout 120s --blame-hang-dump-type none 2>&1 | Tee-Object -Variable log
          $text = ($log | Out-String)
          if ($text -match 'Failed:\s+0,\s+Passed:\s+[1-9]\d*') {
            Write-Host 'Todos os testes passaram; encerramento lento do testhost ignorado.'
            exit 0
          }
          Write-Host 'Falha de teste, hang real ou nenhum resumo de aprovacao encontrado.'
          exit 1

      - name: Build VSIX (MSBuild completo)
        run: msbuild SqlBeaver.slnx /p:Configuration=Release /t:Rebuild /restore /v:m

      # Instalador .exe standalone (baixa o .vsix mais recente e instala; projeto fora da slnx).
      - name: Build instalador (.exe)
        run: msbuild installer/SqlBeaver.Installer/SqlBeaver.Installer.csproj /p:Configuration=Release /restore /v:m

      - name: Stage artefatos versionados
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          Copy-Item dist/SqlBeaver.vsix "SqlBeaver-$v.vsix"
          Copy-Item installer/SqlBeaver.Installer/bin/Release/net48/SqlBeaver-Setup.exe "SqlBeaver-Setup.exe"
          Write-Host "Empacotado SqlBeaver-$v.vsix + SqlBeaver-Setup.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SqlBeaver-*.vsix
            SqlBeaver-Setup.exe
          generate_release_notes: true
          body: |
            Extensão SQL Beaver para SSMS 22 (amd64).

            **Instalação fácil:** baixe e execute o **`SqlBeaver-Setup.exe`** — ele baixa a versão
            mais recente, remove a antiga, instala e preserva suas configurações (chaves de IA,
            ambientes, snippets, histórico). Não precisa do repositório nem de linha de comando.

            **Manual:** duplo clique no `.vsix`. Em ambos os casos, **desative o IntelliSense nativo**
            (Tools > Options > Text Editor > Transact-SQL > IntelliSense). Binários não assinados —
            o Windows/instalador pode mostrar aviso de publisher não verificado.
