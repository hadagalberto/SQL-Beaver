name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore SqlBeaver.slnx

      # Gate pelo RESULTADO dos testes, não pelo encerramento do processo: o testhost
      # net48 às vezes demora a sair por causa de cargas em background (corrida de
      # teardown), o que faria o blame matar com exit 1 mesmo com todos os testes verdes.
      # blame-hang ainda barra hang REAL (teste infinito não imprime o resumo de aprovação).
      - name: Test (xUnit, net48)
        shell: pwsh
        run: |
          dotnet test SqlBeaver.slnx --configuration Release --nologo --blame-hang-timeout 120s --blame-hang-dump-type none 2>&1 | Tee-Object -Variable log
          $text = ($log | Out-String)
          if ($text -match 'Failed:\s+0,\s+Passed:\s+[1-9]\d*') {
            Write-Host 'Todos os testes passaram; encerramento lento do testhost ignorado.'
            exit 0
          }
          Write-Host 'Falha de teste, hang real ou nenhum resumo de aprovacao encontrado.'
          exit 1

      # VSCT/VSIX só compilam no MSBuild completo (gate IsFullMsBuild).
      - name: Build VSIX (MSBuild completo)
        run: msbuild SqlBeaver.slnx /p:Configuration=Release /t:Rebuild /restore /v:m

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: SqlBeaver-vsix
          path: dist/SqlBeaver.vsix
          if-no-files-found: error
