name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore SqlBeaver.slnx

      - name: Test (xUnit, net48)
        run: dotnet test SqlBeaver.slnx --configuration Release --nologo

      # VSCT/VSIX só compilam no MSBuild completo (gate IsFullMsBuild).
      - name: Build VSIX (MSBuild completo)
        run: msbuild SqlBeaver.slnx /p:Configuration=Release /t:Rebuild /restore /v:m

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: SqlBeaver-vsix
          path: dist/SqlBeaver.vsix
          if-no-files-found: error
